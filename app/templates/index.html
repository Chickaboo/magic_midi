<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Itty Bitty Piano</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <main class="shell">
    <header class="header">
      <h1>Itty Bitty Piano</h1>
      <p>Seed MIDI in, continuation out.</p>
    </header>

    <section class="panel">
      <form id="generateForm" enctype="multipart/form-data">
        <label class="field">
          <span>Checkpoint</span>
          <select id="modelSelect" name="model_name" required></select>
        </label>

        <label class="field upload" id="dropZone">
          <input id="seedFile" name="seed_file" type="file" accept=".mid,.midi" required>
          <span id="uploadLabel">Drag and drop seed MIDI here or click to browse</span>
        </label>

        <div class="grid">
          <label class="field">
            <span>Temperature</span>
            <input id="temperature" name="temperature" type="range" min="0.1" max="2.0" step="0.05" value="0.9">
            <em id="temperatureVal">0.90</em>
          </label>

          <label class="field">
            <span>Length (new tokens)</span>
            <input id="length" name="length" type="range" min="64" max="2048" step="64" value="512">
            <em id="lengthVal">512</em>
          </label>

          <label class="field">
            <span>Top-p</span>
            <input id="topP" name="top_p" type="range" min="0.10" max="1.00" step="0.01" value="0.95">
            <em id="topPVal">0.95</em>
          </label>

          <label class="field">
            <span>Top-k</span>
            <input id="topK" name="top_k" type="range" min="3" max="200" step="1" value="50">
            <em id="topKVal">50</em>
          </label>
        </div>

        <div class="actions">
          <button id="generateBtn" type="submit">Generate</button>
          <a id="downloadBtn" class="button ghost disabled" href="#" download>Download MIDI</a>
        </div>
      </form>
    </section>

    <section class="panel status">
      <h2>Status</h2>
      <pre id="statusBox">Ready.</pre>
    </section>
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
